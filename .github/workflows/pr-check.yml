name: PR checks

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: read

jobs:
  test-and-check-version:
    runs-on: self-hosted
    env:
      NODE_AUTH_TOKEN: ${{ secrets.BUILD_GITHUB_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.BUILD_GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: "@swipegames"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Type check
        run: npm run lint

      - name: Check version has been bumped
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm view "${PKG_NAME}@${PKG_VERSION}" version 2>/dev/null; then
            echo "::error::Version ${PKG_VERSION} is already published. Bump the version in package.json before merging."
            exit 1
          fi
          echo "Version ${PKG_VERSION} is available."
