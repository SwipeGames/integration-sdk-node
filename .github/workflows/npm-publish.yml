name: Publish npm package

on:
  push:
    branches:
      - "main"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-publish:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: "@swipegames"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Compute version from build number
        run: |
          BASE=$(node -p "require('./package.json').version.split('.').slice(0,2).join('.')")
          VERSION="$BASE.${GITHUB_RUN_NUMBER}"
          echo "PKG_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Set package version
        run: npm version --no-git-tag-version "$PKG_VERSION"

      - name: Build
        run: npm run build

      - name: Publish to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}
        run: npm publish
